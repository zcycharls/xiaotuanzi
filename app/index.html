<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>小团子 · v10</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#f5f0ff;
  --pet-body:#c8b5f5;--pet-belly:#e8deff;--pet-ear:#b09ae0;
  --pet-shadow:rgba(180,150,240,.25);
  --text-dim:#9b8cc0;--text-main:#5a4a7a;
  --accent:#b39ddb;
  --bar-bg:rgba(255,255,255,.92);--bar-bd:rgba(210,195,255,.65);
  --focus:#7c5cbf;
  --sheet-bg:#fff;--overlay-bg:rgba(90,74,122,.24);

  /* dialog */
  --dlg-bg:rgba(255,255,255,.82);
  --dlg-bd:rgba(220,210,255,.7);
  --msg-pet-bg:#f0ebff;
  --msg-pet-bd:#e0d4ff;
  --msg-pet-color:#6b52a0;
  --msg-user-bg:linear-gradient(135deg,#b39ddb,#7c5cbf);
}

html,body{width:100%;height:100%;overflow:hidden;touch-action:none;
  user-select:none;-webkit-user-select:none;
  background:var(--bg);font-family:'Nunito',sans-serif}

/* ══ DESKTOP PET MODE ══ */
body.pet-mode{background:transparent !important;}
html.pet-mode-html{background:transparent !important}
body.pet-mode::before{display:none}
body.pet-mode .sp{display:none}
body.pet-mode #settings-btn{display:none}
body.pet-mode #chat-dialog{display:none}
body.pet-mode #chat-bar{display:none}
body.pet-mode #hint{display:none}

/* compact pet: just the pet + tray buttons */
#pet-tray{
  display:none;
  position:fixed;top:4px;right:4px;
  flex-direction:column;gap:4px;z-index:200}
body.pet-mode #pet-tray{display:flex}

.tray-btn{
  width:22px;height:22px;border-radius:50%;border:none;
  font-size:11px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  background:rgba(200,185,245,.75);
  backdrop-filter:blur(6px);
  color:#5a4a7a;transition:background .15s;
  -webkit-app-region:no-drag}
.tray-btn:hover{background:rgba(180,160,240,.9)}

/* chat panel: full window overlay when expanded */
body.pet-mode.expanded{background:var(--bg) !important}
body.pet-mode.expanded::before{display:block}
body.pet-mode.expanded #chat-dialog{display:flex}
body.pet-mode.expanded #chat-bar{display:flex}
body.pet-mode.expanded #settings-btn{display:flex}

/* drag region on pet body */
#pw{-webkit-app-region:drag}
#chat-bar,#chat-dialog,#pet-tray,.tray-btn,
#chat-input,#send-btn,#settings-btn,
#task-input,#dlg-clear,#pomo-toggle,
.qp,#pomo-start,#pomo-reset{-webkit-app-region:no-drag}

body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(circle at 20% 18%,rgba(200,181,245,.18) 0%,transparent 50%),
    radial-gradient(circle at 80% 78%,rgba(179,157,219,.15) 0%,transparent 45%)}

.sp{position:fixed;width:5px;height:5px;border-radius:50%;background:var(--accent);
  opacity:0;pointer-events:none;z-index:0;
  animation:twk var(--d,3s) ease-in-out var(--dl,0s) infinite}
@keyframes twk{0%,100%{opacity:0;transform:scale(.5)}50%{opacity:.4;transform:scale(1)}}

/* ═══ TOP BUTTON ═══ */
#settings-btn{
  position:fixed;top:14px;right:14px;
  width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;
  background:var(--bar-bg);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border:1.5px solid var(--bar-bd);
  box-shadow:0 4px 16px rgba(140,110,200,.14);
  display:flex;align-items:center;justify-content:center;font-size:20px;
  z-index:50;transition:transform .18s;touch-action:manipulation}
#settings-btn:active{transform:scale(.91)}

/* ═══ OVERLAY ═══ */
#s-overlay{
  position:fixed;inset:0;background:var(--overlay-bg);z-index:100;
  opacity:0;pointer-events:none;transition:opacity .28s;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
#s-overlay.open{opacity:1;pointer-events:all}

/* ═══ SETTINGS BOTTOM SHEET ═══ */
#s-panel{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--sheet-bg);border-radius:26px 26px 0 0;
  padding-bottom:env(safe-area-inset-bottom,0);
  box-shadow:0 -10px 48px rgba(100,70,180,.16);
  z-index:101;transform:translateY(102%);
  transition:transform .38s cubic-bezier(.3,1.1,.55,1);
  max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
#s-panel.open{transform:translateY(0)}

.sh-handle{width:38px;height:4px;background:#ddd5f8;border-radius:2px;margin:14px auto 0}
.sh-header{display:flex;align-items:center;justify-content:space-between;padding:18px 22px 8px}
.sh-title{font-size:18px;font-weight:800;color:var(--text-main)}
#s-close{width:32px;height:32px;border-radius:50%;border:none;background:#f0ebff;
  font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--text-dim);touch-action:manipulation}
#s-close:active{background:#e2d8ff}
.sh-body{padding:4px 22px 28px}
.seg-lbl{font-size:11px;font-weight:800;color:var(--text-dim);letter-spacing:.07em;
  text-transform:uppercase;margin:18px 0 8px}
.seg{display:flex;gap:6px;background:#f2eeff;border-radius:14px;padding:4px}
.seg-b{flex:1;padding:9px 4px;border:none;border-radius:11px;cursor:pointer;
  font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;
  background:transparent;color:var(--text-dim);
  transition:background .2s,color .2s,box-shadow .2s;touch-action:manipulation}
.seg-b.on{background:#fff;color:var(--focus);box-shadow:0 2px 10px rgba(124,92,191,.18)}
.st-badge{display:inline-flex;align-items:center;gap:5px;
  font-size:11px;font-weight:700;padding:4px 11px;border-radius:20px;margin-top:8px}
.st-badge.ok{background:#e8f5e9;color:#388e3c}
.st-badge.no{background:#f2eeff;color:var(--text-dim)}
.st-badge .dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
.fgrp{display:flex;flex-direction:column;gap:14px;margin-top:14px}
.frow{display:flex;flex-direction:column;gap:5px}
.frow label{font-size:11px;font-weight:800;color:var(--text-dim);letter-spacing:.06em;text-transform:uppercase}
.frow input{width:100%;padding:11px 14px;border:1.5px solid #e3d9ff;border-radius:12px;
  font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;color:var(--text-main);
  background:#faf8ff;outline:none;-webkit-appearance:none;
  transition:border-color .2s,box-shadow .2s;
  -webkit-user-select:text;user-select:text;touch-action:manipulation}
.frow input[type=checkbox]{width:auto;-webkit-appearance:auto;appearance:auto;accent-color:var(--focus)}
.chk-row{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:700;
  color:var(--text-main);cursor:pointer;padding:4px 0}
.frow input:focus{border-color:var(--focus);box-shadow:0 0 0 3px rgba(124,92,191,.11)}
.frow input::placeholder{color:#c8bce0;font-weight:600}
.frow .hint{font-size:11px;color:var(--text-dim);line-height:1.5}
#save-btn{width:100%;padding:14px;border:none;border-radius:14px;
  background:linear-gradient(135deg,#b09ae0,#7c5cbf);
  color:#fff;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;
  cursor:pointer;margin-top:22px;letter-spacing:.04em;
  box-shadow:0 5px 18px rgba(124,92,191,.3);
  transition:transform .14s;touch-action:manipulation}
#save-btn:active{transform:scale(.97)}

/* ═══ PET ═══ */
#pw{position:fixed;width:130px;height:155px;cursor:grab;z-index:10;
  transition:filter .2s;will-change:transform}
#pw:active{cursor:grabbing}
#pw.happy{filter:drop-shadow(0 0 20px rgba(180,150,255,.7))}
#pw.thinking{filter:drop-shadow(0 0 16px rgba(130,190,255,.65))}

.pet-img-wrap{
  width:100%;height:100%;
  animation:breathe-photo 3.6s ease-in-out infinite;
  transform-origin:center 85%;
  filter:drop-shadow(0 8px 16px rgba(60,40,100,.18))}
@keyframes breathe-photo{
  0%,100%{transform:scale(1,1)}
  50%{transform:scale(.985,1.02)}
}

#pet-img{
  width:100%;height:100%;
  object-fit:contain;
  -webkit-user-select:none;user-select:none;
  pointer-events:none;
  /* soft oval mask to fade background */

}

/* click jump */
#pw.jumping{animation:pet-jump .58s cubic-bezier(.3,1.5,.5,1)}
@keyframes pet-jump{
  0%  {transform:translateY(0) scale(1,1)}
  18% {transform:translateY(0) scale(1.12,.88)}
  48% {transform:translateY(-30px) scale(.94,1.08)}
  78% {transform:translateY(0) scale(1.10,.9)}
  100%{transform:translateY(0) scale(1,1)}
}

/* happy wobble */
#pw.happy .pet-img-wrap{animation:photo-wobble .5s ease-in-out 2,breathe-photo 3.6s ease-in-out infinite}
@keyframes photo-wobble{
  0%,100%{transform:rotate(0)}
  25%{transform:rotate(-4deg)}
  75%{transform:rotate(4deg)}
}

/* ═══ HEARTS ═══ */
.heart{position:fixed;font-size:22px;pointer-events:none;z-index:30;
  animation:fh 1.2s ease-out forwards}
@keyframes fh{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-80px) scale(1.4)}}

/* ═══ CHAT DIALOG ═══ */
#chat-dialog{
  position:fixed;left:12px;right:12px;
  bottom:72px; /* sits just above the chat bar */
  max-height:30vh;
  background:var(--dlg-bg);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1.5px solid var(--dlg-bd);
  border-radius:22px;
  box-shadow:0 8px 32px rgba(120,90,200,.13);
  display:flex;flex-direction:column;
  overflow:hidden;
  z-index:35;
  /* hidden until first message */
  opacity:0;pointer-events:none;
  transform:translateY(10px);
  transition:opacity .3s ease, transform .3s cubic-bezier(.34,1.4,.64,1)}
#chat-dialog.visible{opacity:1;pointer-events:auto;transform:translateY(0)}

/* dialog header — pet name + clear button */
#dlg-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px 8px;flex-shrink:0;
  border-bottom:1px solid rgba(210,195,255,.4);
  gap:8px}
#dlg-title{
  display:flex;align-items:center;gap:7px;
  font-size:13px;font-weight:800;color:var(--text-dim);
  flex-shrink:0}
#dlg-title .pet-dot{
  width:22px;height:22px;border-radius:50%;
  background:linear-gradient(135deg,#c8b5f5,#b09ae0);
  display:flex;align-items:center;justify-content:center;font-size:12px;
  flex-shrink:0}
#dlg-header-btns{display:flex;align-items:center;gap:6px;flex-shrink:0}
#dlg-clear{
  padding:4px 11px;border-radius:20px;border:none;
  background:rgba(240,235,255,.8);
  font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;
  color:var(--text-dim);cursor:pointer;touch-action:manipulation;
  white-space:nowrap;
  transition:background .18s}
#dlg-clear:active{background:#e2d8ff}

/* message list */
#dlg-msgs{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:10px 12px 12px;
  display:flex;flex-direction:column;gap:8px;
  /* custom thin scrollbar */
  scrollbar-width:thin;scrollbar-color:rgba(180,150,240,.3) transparent}
#dlg-msgs::-webkit-scrollbar{width:3px}
#dlg-msgs::-webkit-scrollbar-thumb{background:rgba(180,150,240,.35);border-radius:2px}

/* individual message rows */
.dlg-row{display:flex;align-items:flex-end;gap:6px;
  animation:msgIn .26s cubic-bezier(.34,1.4,.64,1)}
@keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.dlg-row.user{flex-direction:row-reverse}

.dlg-avatar{
  width:26px;height:26px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,#c8b5f5,#b09ae0);
  display:flex;align-items:center;justify-content:center;font-size:13px;
  align-self:flex-end;margin-bottom:2px}

.dlg-msg-wrap{display:flex;flex-direction:column;max-width:72%}
.dlg-row.user .dlg-msg-wrap{align-items:flex-end}

.dlg-bubble{
  padding:8px 12px;font-size:13px;font-weight:600;
  line-height:1.55;word-break:break-word;white-space:pre-wrap}
.dlg-row.pet .dlg-bubble{
  background:var(--msg-pet-bg);
  border:1.5px solid var(--msg-pet-bd);
  color:var(--msg-pet-color);
  border-radius:4px 16px 16px 16px}
.dlg-row.user .dlg-bubble{
  background:var(--msg-user-bg);
  color:#fff;
  border-radius:16px 16px 4px 16px}

.dlg-time{
  font-size:10px;font-weight:700;color:var(--text-dim);
  opacity:.55;margin-top:2px;padding:0 2px}
.dlg-row.pet .dlg-time{text-align:left}
.dlg-row.user .dlg-time{text-align:right}

/* thinking row */
.dlg-row.thinking-row .dlg-bubble{
  background:var(--msg-pet-bg);
  border:1.5px solid var(--msg-pet-bd);
  border-radius:4px 16px 16px 16px;
  padding:10px 14px}
.tdots{display:inline-flex;gap:5px;align-items:center;height:16px}
.tdots span{width:6px;height:6px;background:var(--accent);border-radius:50%;
  animation:db .85s ease-in-out infinite}
.tdots span:nth-child(2){animation-delay:.16s}
.tdots span:nth-child(3){animation-delay:.32s}
@keyframes db{0%,80%,100%{transform:scale(.65);opacity:.45}40%{transform:scale(1);opacity:1}}

/* ═══ TASK ANCHOR ═══ */
#task-anchor{
  display:flex;align-items:center;gap:7px;
  padding:7px 14px 7px;flex-shrink:0;
  border-bottom:1px solid rgba(210,195,255,.35);
  background:rgba(244,240,255,.55)}
#task-icon{font-size:13px;flex-shrink:0;opacity:.7}
#task-input{
  flex:1;border:none;background:transparent;outline:none;
  font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;
  color:var(--text-main);
  -webkit-user-select:text;user-select:text;touch-action:manipulation}
#task-input::placeholder{color:var(--text-dim);opacity:.65;font-weight:600}
#task-clear{font-size:14px;border:none;background:none;cursor:pointer;
  color:var(--text-dim);opacity:.55;padding:0 2px;line-height:1;
  touch-action:manipulation;flex-shrink:0;display:none}
#task-anchor:focus-within #task-clear{display:block}

/* ═══ POMODORO WIDGET ═══ */
#pomo-widget{
  flex-shrink:0;border-bottom:1px solid rgba(210,195,255,.35);
  padding:7px 14px 8px;background:rgba(248,245,255,.6);
  display:none;flex-direction:column;gap:5px}
#pomo-widget.open{display:flex}

#pomo-row{display:flex;align-items:center;gap:8px;width:100%}
#pomo-mode{font-size:11px;font-weight:800;color:var(--text-dim);
  letter-spacing:.05em;text-transform:uppercase;flex-shrink:0}
#pomo-time{font-size:16px;font-weight:800;color:var(--text-main);
  letter-spacing:.04em;flex-shrink:0;min-width:44px}
#pomo-widget.break-mode #pomo-time{color:#3a7a4a}
#pomo-count{font-size:11px;color:var(--accent);flex:1}
#pomo-btns{display:flex;gap:5px;flex-shrink:0}
.pomo-btn{padding:4px 12px;border-radius:16px;border:none;cursor:pointer;
  font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;
  touch-action:manipulation;transition:transform .12s,background .15s}
.pomo-btn:active{transform:scale(.93)}
#pomo-start{background:linear-gradient(135deg,#b39ddb,#7c5cbf);color:#fff;
  box-shadow:0 2px 8px rgba(124,92,191,.22)}
#pomo-start.running{background:linear-gradient(135deg,#f0a0b0,#d05070)}
#pomo-reset{background:rgba(240,235,255,.9);color:var(--text-dim);
  border:1.5px solid rgba(210,195,255,.7)}

#pomo-track{width:100%;height:3px;background:rgba(200,185,245,.25);
  border-radius:2px;overflow:hidden}
#pomo-fill{height:100%;background:linear-gradient(90deg,#b39ddb,#7c5cbf);
  border-radius:2px;width:0%;transition:width .9s linear}
#pomo-widget.break-mode #pomo-fill{background:linear-gradient(90deg,#a8d8b0,#5baa6e)}

/* header actions */
#dlg-header-btns{display:flex;align-items:center;gap:6px}
#pomo-toggle{padding:4px 10px;border-radius:20px;border:1.5px solid rgba(210,195,255,.7);
  background:rgba(240,235,255,.8);font-size:12px;cursor:pointer;
  font-family:'Nunito',sans-serif;font-weight:700;color:var(--text-dim);
  touch-action:manipulation;transition:background .15s}
#pomo-toggle.on{background:#fff0d8;border-color:#f0c070;color:#8a6010}
#pomo-toggle:active{background:#e2d8ff}

/* ═══ QUICK PHRASES ═══ */
#quick-bar{
  display:flex;gap:7px;align-items:center;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  padding:0 12px 8px;flex-shrink:0;
  /* hide scrollbar */
  scrollbar-width:none}
#quick-bar::-webkit-scrollbar{display:none}

.qp{
  flex-shrink:0;
  padding:6px 13px;border-radius:20px;border:1.5px solid var(--bar-bd);
  background:rgba(255,255,255,.75);
  font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;
  color:var(--text-main);cursor:pointer;white-space:nowrap;
  touch-action:manipulation;
  transition:background .15s,transform .12s,border-color .15s}
.qp:active{background:#ede6ff;border-color:#c4b0f0;transform:scale(.94)}
.qp.sent{background:#ede6ff;border-color:#b09ae0;color:var(--focus)}

/* streaming cursor */
.stream-bubble::after{
  content:'▍';font-size:11px;color:var(--accent);
  animation:cur .7s step-end infinite;margin-left:1px;vertical-align:middle}
.stream-bubble.done::after{display:none}
@keyframes cur{0%,100%{opacity:1}50%{opacity:0}}

/* ═══ CHAT BAR ═══ */
#chat-bar{
  position:fixed;bottom:0;left:0;right:0;
  padding-bottom:calc(env(safe-area-inset-bottom,0));
  background:var(--bar-bg);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-top:1.5px solid var(--bar-bd);
  display:flex;flex-direction:column;
  z-index:40;box-shadow:0 -4px 22px rgba(150,120,220,.1)}
#chat-row{display:flex;align-items:flex-end;gap:8px;padding:9px 12px 9px}
#chat-input{
  flex:1;border:1.5px solid #e2d8ff;border-radius:22px;
  padding:10px 16px;resize:none;
  font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;
  color:var(--text-main);background:#fdf9ff;outline:none;
  max-height:110px;overflow-y:auto;line-height:1.5;
  transition:border-color .2s,box-shadow .2s;
  touch-action:manipulation;
  -webkit-user-select:text;user-select:text}
#chat-input:focus{border-color:var(--focus);box-shadow:0 0 0 3px rgba(124,92,191,.1)}
#chat-input::placeholder{color:#c4b8e0;font-weight:600}
#send-btn{width:44px;height:44px;min-width:44px;border-radius:50%;border:none;
  background:linear-gradient(135deg,#b39ddb,#7c5cbf);color:#fff;font-size:17px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 3px 14px rgba(124,92,191,.32);
  transition:transform .14s,opacity .2s;touch-action:manipulation;flex-shrink:0}
#send-btn:active{transform:scale(.89)}
#send-btn:disabled{opacity:.42;cursor:default}

#hint{position:fixed;bottom:110px;left:0;right:0;text-align:center;
  font-size:12px;color:var(--accent);font-weight:600;letter-spacing:.03em;
  opacity:.65;pointer-events:none;z-index:5;transition:opacity .4s}
#hint.hidden{opacity:0}
</style>
</head>
<body>

<div id="sparkles"></div>
<button id="settings-btn" aria-label="设置">⚙️</button>

<!-- Desktop pet tray (only in pet mode) -->
<div id="pet-tray">
  <button class="tray-btn" id="tray-expand" title="展开聊天">💬</button>
  <button class="tray-btn" id="tray-settings" title="设置">⚙️</button>
  <button class="tray-btn" id="tray-hide" title="最小化">➖</button>
  <button class="tray-btn" id="tray-close" title="退出">✕</button>
</div>

<div id="s-overlay"></div>

<!-- Settings Panel -->
<div id="s-panel" role="dialog" aria-modal="true" aria-label="API 设置">
  <div class="sh-handle"></div>
  <div class="sh-header">
    <span class="sh-title">🔧 API 设置</span>
    <button id="s-close" aria-label="关闭">✕</button>
  </div>
  <div class="sh-body">
    <div class="seg-lbl">API 提供商</div>
    <div class="seg" role="group">
      <button class="seg-b on" data-p="anthropic">Anthropic</button>
      <button class="seg-b" data-p="openai">OpenAI 兼容</button>
    </div>
    <div id="st-row"></div>
    <div class="fgrp">
      <div class="frow">
        <label for="f-key">API KEY</label>

}

/* ── streaming bubble state ── */
let streamBubbleEl=null;   // the <div class="dlg-bubble"> being written into
let streamAccum='';        // accumulated plain text so far

function onStreamChunk(chunk){
  if(!streamBubbleEl) return;
  streamAccum+=chunk;
  streamBubbleEl.innerHTML=escHtml(streamAccum);
  scrollToBottom();
}

function startStreamBubble(){
  /* swap out the thinking dots row for a real pet row with empty bubble */
  removeThinking();
  showDialog();
  const row=document.createElement('div');
  row.className='dlg-row pet';
  row.innerHTML=`

    </div>`;
  dlgMsgs.appendChild(row);
  streamBubbleEl=row.querySelector('.dlg-bubble');
  streamAccum='';
  scrollToBottom();
}

function finalizeStreamBubble(){
  if(streamBubbleEl) streamBubbleEl.classList.add('done');
  streamBubbleEl=null;
}

/* ════════ SEND ════════ */
const chatInput=document.getElementById('chat-input');
const sendBtn=document.getElementById('send-btn');
const pw=document.getElementById('pw');

async function send(){
  if(busy) return;
  const msg=chatInput.value.trim();if(!msg) return;
  chatInput.value='';chatInput.style.height='';
  setHappy(true);spawnHeart(px+55,py+35);
  appendMsg('user',msg);

  if(!hasKey()){
    setTimeout(()=>appendMsg('pet',rand(FALLBACK)),300);
    return;
  }

  busy=true;sendBtn.disabled=true;
  pw.classList.add('thinking');
  showThinkingIndicator();

  /* swap to stream bubble on first chunk */
  let firstChunk=true;
  const origOnStreamChunk=onStreamChunk;
  // patch: intercept first chunk to create bubble
  const _patch=chunk=>{
    if(firstChunk){firstChunk=false;startStreamBubble();}
    origOnStreamChunk(chunk);
  };
  // temporarily override
  window._streamPatch=_patch;

  try{
    await streamAPIPatched(msg);
    pw.classList.remove('thinking');
    finalizeStreamBubble();
  }catch(e){
    pw.classList.remove('thinking');
    removeThinking();
    finalizeStreamBubble();
    const txt=(e&&e.message)?e.message:String(e||'未知错误');
    appendErrorMsg(txt);
    if(history.at(-1)?.role==='user') history.pop();
    console.error('[小团子]',e);
  }finally{busy=false;sendBtn.disabled=false;window._streamPatch=null;}
}

/* Patched wrapper that uses _streamPatch for first-chunk detection */
async function streamAPIPatched(msg){
  history.push({role:'user',content:msg});
  if(history.length>20) history=history.slice(-20);
  const isAnthropic=cfg.p==='anthropic';
  const model=cfg.m||(isAnthropic?DEFAULT_MODEL.anthropic:DEFAULT_MODEL.openai);
  const url=isAnthropic
    ?proxify('https://api.anthropic.com/v1/messages')
    :proxify(buildChatURL(cfg.b||'https://api.openai.com'));

  const headers=isAnthropic
    ?{'content-type':'application/json','x-api-key':cfg.k,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'}
    :{'content-type':'application/json','Authorization':`Bearer ${cfg.k}`};

  const body=isAnthropic
    ?JSON.stringify({model,max_tokens:200,stream:true,system:SYS,messages:history})
    :JSON.stringify({model,messages:[{role:'system',content:SYS},...history],max_tokens:200,stream:true});

  let r;
  try{r=await fetch(url,{method:'POST',headers,body});}
  catch(e){throw new Error(`网络连接失败，请在 ⚙️ 设置中勾选"通过 CORS 代理"后重试。`);}
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e?.error?.message||`HTTP ${r.status}`);}

  const extractChunk=isAnthropic
    ?(d=>d?.delta?.type==='text_delta'?d.delta.text:null)
    :(d=>d?.choices?.[0]?.delta?.content||null);

  const reader=r.body.getReader();
  const dec=new TextDecoder();
  let buf='',full='';
  while(true){
    const {done,value}=await reader.read();
    if(done) break;
    buf+=dec.decode(value,{stream:true});
    const lines=buf.split('\n');buf=lines.pop();
    for(const line of lines){
      if(!line.startsWith('data:')) continue;
      const raw=line.slice(5).trim();
      if(raw==='[DONE]') break;
      try{
        const chunk=extractChunk(JSON.parse(raw));
        if(chunk){
          full+=chunk;
          const fn=window._streamPatch||onStreamChunk;
          fn(chunk);
        }
      }catch{}
    }
  }
  history.push({role:'assistant',content:full||'…'});
}

const POMO_WORK=25*60, POMO_BREAK=5*60;
let pomoMode='work';   // 'work' | 'break'
let pomoLeft=POMO_WORK;
let pomoTotal=POMO_WORK;
let pomoRunning=false;
let pomoCount=0;
let pomoTick=null;

const pomoWidget=document.getElementById('pomo-widget');
const pomoToggle=document.getElementById('pomo-toggle');
const pomoTimeEl=document.getElementById('pomo-time');
const pomoFill=document.getElementById('pomo-fill');
const pomoModeEl=document.getElementById('pomo-mode');
const pomoCountEl=document.getElementById('pomo-count');
const pomoStartBtn=document.getElementById('pomo-start');
const pomoResetBtn=document.getElementById('pomo-reset');

function fmtPomo(s){
  return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}
function renderPomo(){
  pomoTimeEl.textContent=fmtPomo(pomoLeft);
  const pct=100*(1-pomoLeft/pomoTotal);
  pomoFill.style.width=pct+'%';
  pomoModeEl.textContent=pomoMode==='work'?'专注中':'休息中';
  pomoCountEl.textContent=`🍅 × ${pomoCount}`;
  pomoWidget.classList.toggle('break-mode',pomoMode==='break');
  pomoStartBtn.textContent=pomoRunning?'暂停':'开始';
  pomoStartBtn.classList.toggle('running',pomoRunning);
}

function pomoComplete(){
  clearInterval(pomoTick);pomoTick=null;pomoRunning=false;
  if(pomoMode==='work'){
    pomoCount++;
    pomoMode='break';pomoLeft=POMO_BREAK;pomoTotal=POMO_BREAK;
    spawnHeart(px+55,py+35);
    const tasks=currentTask?`「${currentTask}」专注完成！`:'专注完成！';
    appendMsg('pet',`${tasks} 休息 5 分钟吧 🌸\n深呼吸，动动手脚～`);
  } else {
    pomoMode='work';pomoLeft=POMO_WORK;pomoTotal=POMO_WORK;
    appendMsg('pet','休息结束啦 💜\n准备好继续了吗？');
  }
  renderPomo();
}

pomoStartBtn.addEventListener('click',()=>{
  if(pomoRunning){
    clearInterval(pomoTick);pomoTick=null;pomoRunning=false;
  } else {
    pomoRunning=true;
    pomoTick=setInterval(()=>{
      pomoLeft--;
      if(pomoLeft<=0) pomoComplete();
      else renderPomo();
    },1000);
  }
  renderPomo();
});

pomoResetBtn.addEventListener('click',()=>{
  clearInterval(pomoTick);pomoTick=null;pomoRunning=false;
  pomoLeft=pomoMode==='work'?POMO_WORK:POMO_BREAK;
  pomoTotal=pomoLeft;renderPomo();
});

pomoToggle.addEventListener('click',()=>{
  const open=pomoWidget.classList.toggle('open');
  pomoToggle.classList.toggle('on',open);
  if(open&&!dlg.classList.contains('visible')) showDialog();
});

renderPomo();

  if(currentTask){
    const msgs=[
      `现在是 ${hm} ☁️\n你还在做「${currentTask}」吗？`,
      `${hm} 了 🌙\n「${currentTask}」进展怎么样？`,
      `时间到 ${hm} 啦 ✨\n还好吗，还在做「${currentTask}」？`,
    ];
    return rand(msgs);
  } else {
    const msgs=[
      `现在是 ${hm} 🕐\n你在做什么呢？`,
      `${hm} 了，注意时间哦 🌸`,
      `现在 ${hm}，还好吗？ 💜`,
    ];
    return rand(msgs);
  }
}

// Periodic check-in (respects freq setting)
setInterval(()=>{
  if(!busy && (cfg.freq||'mid')!=='off') appendMsg('pet',checkinMsg());
},CHECK_INTERVAL);

// Idle: frequency driven by cfg.freq
const FREQ_MS={off:null, low:4*60*1000, mid:2.5*60*1000, high:90*1000};
const FREQ_JITTER={off:0, low:2*60*1000, mid:60*1000, high:60*1000};
function scheduleIdle(){
  const base=FREQ_MS[cfg.freq||'mid'];
  if(base===null){setTimeout(scheduleIdle,30*1000);return;} // off: re-check every 30s
  setTimeout(()=>{
    if(!busy && (cfg.freq||'mid')!=='off'){
      const msg=Math.random()<0.4?rand(ADHD_TIPS):rand(FALLBACK);
      appendMsg('pet',msg);
    }
    scheduleIdle();
  },base+Math.random()*FREQ_JITTER[cfg.freq||'mid']);
}
scheduleIdle();



/* ════════ HELPERS ════════ */
function rand(a){return a[Math.floor(Math.random()*a.length)];}
function spawnHeart(cx,cy){
  const pool=['💜','✨','🌸','⭐','🫧'];
  const el=document.createElement('div');el.className='heart';
  el.textContent=rand(pool);
  el.style.left=(cx-11)+'px';el.style.top=(cy-11)+'px';
  document.body.appendChild(el);setTimeout(()=>el.remove(),1300);
}
let happyT=null;
function setHappy(on){
  pw.classList.toggle('happy',on);
  if(on){if(happyT)clearTimeout(happyT);happyT=setTimeout(()=>pw.classList.remove('happy'),1200);}
}
function petReact(){
  pw.classList.remove('jumping','blinking');
  void pw.offsetWidth;
  pw.classList.add('jumping');
  setTimeout(()=>pw.classList.remove('jumping'),600);
  
}

/* ════════ PET MOOD (SVG mouth) ════════ */
const petMouth=document.getElementById('pet-mouth'); // null for photo pet
function setMouthNormal(){if(petMouth)petMouth.setAttribute('d','M71 94 Q80 100 89 94');}
function setMouthHappy(){if(petMouth)petMouth.setAttribute('d','M68 93 Q80 102 92 93');}
function setMouthThinking(){if(petMouth)petMouth.setAttribute('d','M73 96 Q80 96 87 96');}

const _origAddHappy=pw.classList.add.bind(pw.classList);
// Watch class changes to sync mouth
const _moodObs=new MutationObserver(()=>{
  if(pw.classList.contains('thinking')) setMouthThinking();
  else if(pw.classList.contains('happy')) setMouthHappy();
  else setMouthNormal();
});
_moodObs.observe(pw,{attributes:true,attributeFilter:['class']});
const PHRASES=[
  {label:'😵 我走神了',text:'我刚才走神了，帮我重新专注一下'},
  {label:'😓 好累',text:'感觉好累，不想动'},
  {label:'🌀 脑子乱',text:'脑子很乱，不知道该做什么'},
  {label:'✨ 帮我专注',text:'帮我专注，我现在要开始做事了'},
  {label:'🌸 鼓励我',text:'给我一句鼓励吧'},
  {label:'😤 做不下去',text:'这件事我做不下去了'},
];

const quickBar=document.getElementById('quick-bar');
PHRASES.forEach(({label,text})=>{
  const btn=document.createElement('button');
  btn.className='qp'; btn.textContent=label;
  btn.addEventListener('click',()=>{
    if(busy) return;
    // brief "sent" flash
    btn.classList.add('sent');
    setTimeout(()=>btn.classList.remove('sent'),600);
    // put text into input then send
    chatInput.value=text;
    send();
  });
  quickBar.appendChild(btn);
});


const BAR_H_PET=110;
let px=Math.max(20,Math.round(window.innerWidth*0.28));
let py=Math.min(window.innerHeight/2-80,window.innerHeight-BAR_H_PET-160);
function applyPos(){pw.style.left=px+'px';pw.style.top=py+'px';}
applyPos();

let drag=false,sx,sy,spx,spy,moved=false;
function ptr(e){return e.touches?{x:e.touches[0].clientX,y:e.touches[0].clientY}:{x:e.clientX,y:e.clientY};}
function onStart(e){
  if(e.target.closest('#settings-btn,#chat-bar,#chat-dialog,#s-overlay,#s-panel')) return;
  drag=true;moved=false;
  const p=ptr(e);sx=p.x;sy=p.y;spx=px;spy=py;
  pw.style.transition='none';
}
function onMove(e){
  if(!drag) return;e.preventDefault();
  const p=ptr(e);
  const dx=p.x-sx,dy=p.y-sy;
  if(Math.abs(dx)>4||Math.abs(dy)>4) moved=true;
  const maxY=window.innerHeight-BAR_H_PET-130;
  px=Math.max(0,Math.min(window.innerWidth-110,spx+dx));
  py=Math.max(0,Math.min(maxY,spy+dy));
  applyPos();
}
function onEnd(){
  if(!drag) return;drag=false;
  pw.style.transition='filter .2s';
  if(!moved){
    petReact();
    setHappy(true);spawnHeart(px+55,py+40);
    appendMsg('pet',hasKey()?'在这里呢~ 🌸\n有什么想说的吗？':rand(FALLBACK));
  }
}
pw.addEventListener('touchstart',onStart,{passive:false});
pw.addEventListener('touchmove',onMove,{passive:false});
pw.addEventListener('touchend',onEnd);
document.addEventListener('mousedown',onStart);
window.addEventListener('mousemove',onMove);
window.addEventListener('mouseup',onEnd);
document.body.addEventListener('touchmove',e=>{
  if(!e.target.closest('#chat-input,#s-panel,#dlg-msgs'))e.preventDefault();
},{passive:false});
window.addEventListener('resize',()=>{
  px=Math.min(px,window.innerWidth-110);
  py=Math.min(py,window.innerHeight-BAR_H_PET-130);
  applyPos();dlgBottom();
});

/* ════════ ENTRANCE ════════ */
pw.style.opacity='0';
pw.style.transition='opacity .6s ease';
requestAnimationFrame(()=>requestAnimationFrame(()=>{pw.style.opacity='1';}));
setTimeout(()=>{pw.style.transition='filter .2s';},700);


/* ════════ DESKTOP PET MODE ════════ */
const IS_ELECTRON = !!window.petBridge;
let petExpanded = false;

if(IS_ELECTRON){
  document.body.classList.add('pet-mode');
  document.documentElement.style.background = 'transparent';
  document.documentElement.style.setProperty('--bg','transparent');

  // Tray buttons
  document.getElementById('tray-expand').addEventListener('click', ()=>{
    petExpanded = !petExpanded;
    if(petExpanded){
      document.body.classList.add('expanded');
      window.petBridge.expand();
      document.getElementById('tray-expand').textContent = '🐨';
    } else {
      document.body.classList.remove('expanded');
      window.petBridge.collapse();
      document.getElementById('tray-expand').textContent = '💬';
    }
  });

  document.getElementById('tray-settings').addEventListener('click', ()=>{
    // expand first then open settings
    if(!petExpanded){
      petExpanded = true;
      document.body.classList.add('expanded');
      window.petBridge.expand();
      document.getElementById('tray-expand').textContent = '🐨';
    }
    openSettings();
  });

  document.getElementById('tray-hide').addEventListener('click', ()=>{
    window.petBridge.hideApp();
  });

  document.getElementById('tray-close').addEventListener('click', ()=>{
    window.petBridge.closeApp();
  });

  // In pet mode, clicking pet also toggles expand
  pw.addEventListener('click', (e)=>{
    if(!e.target.closest('.tray-btn')) {
      document.getElementById('tray-expand').click();
    }
  });
}

})();
</script>
